{% extends 'base.html' %}

{% block head %} 
        
    <title>EbayScraper</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="{{url_for('static', filename='js/pages/search.js')}}"></script>

{% endblock %}

{% block body %}

    <div class="w-full min-h-screen flex justify-center">
        <div class="w-[95%] flex flex-col gap-5 p-1">

            <!-- Action Buttons -->
            <div class="w-full h-20 flex justify-between items-end">
                <button class="relative w-[10%] h-10 outline outline-white rounded-lg text-white flex items-center justify-between p-2 cursor-pointer">Best Match<img class="w-7" src="{{url_for('static', filename='images/icons/dropdown-light.png')}}" alt=""></button>
                <button class="relative w-[10%] h-10 outline outline-white rounded-lg text-white flex items-center justify-between p-2 cursor-pointer">Newly Listed<img class="w-7" src="{{url_for('static', filename='images/icons/dropdown-light.png')}}" alt=""></button>
            </div>

            <!-- Listings -->
            <div id="listings" class="flex-1 flex flex-col items-start outline outline-white">
            </div>
        </div>
    </div>

{% endblock %}
